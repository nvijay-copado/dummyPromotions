<template>
    <lightning-card title="Bulk User Story Creator" icon-name="custom:custom63">
        <div class="slds-p-around_medium">
            <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_medium">
                Generate bulk User Stories, create associated metadata, and simulate promotion chains across your pipeline.
            </p>
            
            <!-- Configuration Section -->
            <div class="slds-section slds-is-open">
                <h3 class="slds-section__title slds-theme_shade">
                    <span class="slds-truncate slds-p-horizontal_small" title="Configuration">Configuration</span>
                </h3>
                <div aria-hidden="false" class="slds-section__content">
            <div class="slds-grid slds-gutters slds-wrap">
                
                <!-- Pipeline Selection -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-combobox
                        name="pipeline"
                        label="Pipeline *"
                        value={selectedPipelineId}
                        placeholder="Select Pipeline"
                        options={pipelineOptions}
                        onchange={handlePipelineChange}
                        required
                    ></lightning-combobox>
                </div>

                <!-- Project Selection -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-combobox
                        name="project"
                        label="Project *"
                        value={selectedProjectId}
                        placeholder="Select Project"
                        options={projectOptions}
                        onchange={handleProjectChange}
                        disabled={isLoadingProjects}
                        required
                    ></lightning-combobox>
                </div>

                <!-- Release Selection -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-combobox
                        name="release"
                        label="Release (Optional)"
                        value={selectedReleaseId}
                        placeholder="Select Release"
                        options={releaseOptions}
                        onchange={handleReleaseChange}
                        disabled={isLoadingReleases}
                    ></lightning-combobox>
                </div>

                <!-- Record Type Selection -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-combobox
                        name="recordType"
                        label="User Story Record Type *"
                        value={selectedRecordTypeId}
                        placeholder="Select Record Type"
                        options={recordTypeOptions}
                        onchange={handleRecordTypeChange}
                        required
                    ></lightning-combobox>
                </div>

                <!-- Total User Stories -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <lightning-input
                        type="number"
                        name="totalUserStories"
                        label="Total User Stories *"
                        value={totalUserStories}
                        onchange={handleTotalUserStoriesChange}
                        min="1"
                        required
                    ></lightning-input>
                </div>

                <!-- User Stories Per Batch -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <lightning-input
                        type="number"
                        name="userStoriesPerBatch"
                        label="User Stories Per Batch *"
                        value={userStoriesPerBatch}
                        onchange={handleUserStoriesPerBatchChange}
                        min="1"
                        required
                    ></lightning-input>
                </div>

                <!-- Metadata Per User Story -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <lightning-input
                        type="number"
                        name="metadataPerUserStory"
                        label="Metadata Items Per User Story *"
                        value={metadataPerUserStory}
                        onchange={handleMetadataPerUserStoryChange}
                        min="0"
                        required
                    ></lightning-input>
                </div>

            </div>
                </div>
            </div>

            <!-- Pipeline Details -->
            <template if:true={pipelineDetails}>
                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title slds-theme_shade">
                        <span class="slds-truncate slds-p-horizontal_small" title="Environment Selection">Environment Selection</span>
                    </h3>
                    <div aria-hidden="false" class="slds-section__content">
                        <div class="slds-grid slds-gutters slds-wrap slds-grid_vertical-align-center">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="slds-box slds-box_x-small slds-theme_default slds-media slds-media_center">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="standard:entitlement_process" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <p class="slds-text-heading_small">{pipelineDetails.pipelineName}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{pipelineDetails.totalEnvironments} Environments in Pipeline</p>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-combobox
                                    name="environment"
                                    label="Select Environment"
                                    value={selectedEnvironmentId}
                                    placeholder="Select Environment"
                                    options={environmentOptions}
                                    onchange={handleEnvironmentChange}
                                    required
                                ></lightning-combobox>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Validation Results -->
            <template if:true={showValidation}>
                <div class="slds-m-top_medium">
                    <template if:true={hasValidationErrors}>
                        <div class="slds-box slds-theme_error slds-m-bottom_small">
                            <h4 class="slds-text-heading_small slds-m-bottom_x-small">Validation Errors</h4>
                            <ul class="slds-list_dotted">
                                <template for:each={validationResult.errors} for:item="error">
                                    <li key={error}>{error}</li>
                                </template>
                            </ul>
                        </div>
                    </template>

                    <template if:true={hasValidationWarnings}>
                        <div class="slds-box slds-theme_warning slds-m-bottom_small">
                            <h4 class="slds-text-heading_small slds-m-bottom_x-small">Warnings</h4>
                            <ul class="slds-list_dotted">
                                <template for:each={validationResult.warnings} for:item="warning">
                                    <li key={warning}>{warning}</li>
                                </template>
                            </ul>
                        </div>
                    </template>

                    <template if:true={validationResult.isValid}>
                        <div class="slds-notify slds-notify_alert slds-theme_success slds-m-bottom_small" role="alert">
                            <span class="slds-assistive-text">success</span>
                            <span class="slds-icon_container slds-icon-utility-success slds-m-right_x-small">
                                <lightning-icon icon-name="utility:success" variant="inverse" size="x-small"></lightning-icon>
                            </span>
                            <h2>Configuration is valid!</h2>
                        </div>
                        
                        <div class="slds-box slds-theme_default slds-theme_alert-texture">
                            <div class="slds-grid slds-gutters slds-text-align_center">
                                <div class="slds-col slds-size_1-of-3" style="border-right: 1px solid #dddbda;">
                                    <div class="slds-text-heading_medium">{validationResult.estimatedBatches}</div>
                                    <div class="slds-text-body_small slds-text-color_weak">Batches</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3" style="border-right: 1px solid #dddbda;">
                                    <div class="slds-text-heading_medium">{validationResult.estimatedTimeMinutes} min</div>
                                    <div class="slds-text-body_small slds-text-color_weak">Est. Time</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3">
                                    <div class="slds-text-heading_medium">{validationResult.totalMetadataRecords}</div>
                                    <div class="slds-text-body_small slds-text-color_weak">Total Metadata</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Action Buttons -->
            <div class="slds-m-top_medium slds-text-align_right slds-border_top slds-p-top_medium">
                <lightning-button
                    label="Validate Configuration"
                    variant="neutral"
                    onclick={handleValidate}
                    disabled={isValidating}
                    class="slds-m-right_small"
                ></lightning-button>
                
                <lightning-button
                    label="Start Batch"
                    variant="brand"
                    onclick={handleStartBatch}
                    disabled={isStartingBatch}
                    class="slds-m-left_small"
                ></lightning-button>
            </div>

            <!-- Execution Mode Modal -->
            <template if:true={showExecutionModal}>
                <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <div class="slds-modal__header">
                            <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Select Execution Mode</h1>
                        </div>
                        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                            <lightning-radio-group name="executionMode"
                                label="Choose how to create User Stories"
                                options={executionModeOptions}
                                value={selectedExecutionMode}
                                type="radio"
                                onchange={handleExecutionModeChange}>
                            </lightning-radio-group>
                        </div>
                        <div class="slds-modal__footer">
                            <lightning-button label="Cancel" variant="neutral" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                            <lightning-button label="Confirm & Start" variant="brand" onclick={handleConfirmBatch}></lightning-button>
                        </div>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
            </template>

        </div>
    </lightning-card>

    <!-- Batch Status Section -->
    <template if:true={showBatchStatus}>
        <lightning-card title="Batch Execution Status" icon-name="standard:apex" class="slds-m-top_medium">
            <div slot="actions">
                <lightning-button-icon
                    icon-name="utility:refresh"
                    alternative-text="Refresh Status"
                    onclick={handleRefreshStatus}
                    variant="border-filled"
                ></lightning-button-icon>
            </div>
            
            <div class="slds-p-around_medium">
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <p class="slds-text-body_small">Batch ID: <strong>{batchId}</strong></p>
                        <p class="slds-text-body_small">Status: <strong>{batchStatus.status}</strong></p>
                        <p class="slds-text-body_small">Progress: <strong>{batchStatus.jobItemsProcessed} / {batchStatus.totalJobItems}</strong></p>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <p class="slds-text-body_small">Errors: <strong>{batchStatus.numberOfErrors}</strong></p>
                        <template if:true={batchStatus.extendedStatus}>
                            <p class="slds-text-body_small">Details: <strong>{batchStatus.extendedStatus}</strong></p>
                        </template>
                    </div>
                </div>

                <div class="slds-m-top_medium">
                    <lightning-progress-bar
                        value={batchProgressPercentage}
                        variant={batchProgressVariant}
                    ></lightning-progress-bar>
                </div>

                <template if:true={isBatchCompleted}>
                    <div class="slds-m-top_medium">
                        <template if:true={isBatchSuccessful}>
                            <div class="slds-notify slds-notify_alert slds-theme_success">
                                <span class="slds-assistive-text">success</span>
                                <h2>Batch completed successfully! User stories have been created.</h2>
                            </div>
                        </template>
                        <template if:false={isBatchSuccessful}>
                            <div class="slds-notify slds-notify_alert slds-theme_error">
                                <span class="slds-assistive-text">error</span>
                                <h2>Batch completed with errors. Please check the details above.</h2>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </lightning-card>
    </template>

    <!-- User Story List Section -->
    <template if:true={showUserStorySection}>
        <lightning-card title="Created User Stories" icon-name="standard:user" class="slds-m-top_medium">
            <div slot="actions">
                <template if:true={showUserStoryList}>
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        onclick={handleRefreshUserStories}
                        variant="border-filled"
                        class="slds-m-left_x-small"
                    ></lightning-button-icon>
                </template>
            </div>
            
            <div class="slds-p-around_medium">
                
                <!-- User Story List -->
                <template if:true={showUserStoryList}>
                    <template if:true={isLoadingUserStories}>
                        <div class="slds-text-align_center slds-p-around_large">
                            <lightning-spinner alternative-text="Loading user stories..." size="medium"></lightning-spinner>
                        </div>
                    </template>
                    
                    <template if:false={isLoadingUserStories}>
                        <template if:true={hasUserStories}>
                            <!-- Data Table -->
                            <lightning-datatable
                                key-field="id"
                                data={userStories}
                                columns={userStoryColumns}
                                hide-checkbox-column
                                onrowaction={handleUserStoryRowAction}
                            ></lightning-datatable>
                            
                            <!-- Pagination -->
                            <div class="slds-m-top_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                <div class="slds-col">
                                    <span class="slds-text-body_small slds-text-color_weak">{pageInfo}</span>
                                </div>
                                <div class="slds-col">
                                    <lightning-button-group>
                                        <lightning-button
                                            label="First"
                                            onclick={handleFirstPage}
                                            disabled={isFirstPage}
                                            variant="neutral"
                                        ></lightning-button>
                                        <lightning-button
                                            icon-name="utility:chevronleft"
                                            alternative-text="Previous"
                                            onclick={handlePreviousPage}
                                            disabled={isFirstPage}
                                            variant="neutral"
                                        ></lightning-button>
                                        <lightning-button
                                            icon-name="utility:chevronright"
                                            alternative-text="Next"
                                            onclick={handleNextPage}
                                            disabled={isLastPage}
                                            variant="neutral"
                                        ></lightning-button>
                                        <lightning-button
                                            label="Last"
                                            onclick={handleLastPage}
                                            disabled={isLastPage}
                                            variant="neutral"
                                        ></lightning-button>
                                    </lightning-button-group>
                                </div>
                            </div>
                        </template>
                        
                        <template if:false={hasUserStories}>
                            <div class="slds-text-align_center slds-p-around_medium">
                                <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                                <p class="slds-text-body_regular slds-m-top_small">No user stories found.</p>
                            </div>
                        </template>
                    </template>
                </template>
            </div>
        </lightning-card>
    </template>

</template>
